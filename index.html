
  <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagen de Fondo</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
        }

        .bg-image {
            /* Pon aquí la ruta de tu imagen */
            background-image: url('tu-imagen.jpg');

            /* Ajustes de la imagen para que cubra toda la pantalla */
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed; /* Opcional: fondo fijo al hacer scroll [6] */
        }
    </style>
</head>
<body>
   
    imagen que cubra toda la pantalla

</body>
</html>
